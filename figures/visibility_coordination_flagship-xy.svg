<text x="24.00" y="598.00" fill="#2c2c2c" font-family="Georgia, Times New Roman, serif" font-size="13" font-weight="400">Figure: Flagship visibility-coordination scenario in `sekai` (visibility_coordination_flagship.sk). Two entities begin with ambiguous candidate</text>
<text x="24.00" y="616.00" fill="#2c2c2c" font-family="Georgia, Times New Roman, serif" font-size="13" font-weight="400">actions while moving targets pass through a corridor-like visibility structure. The panels show semantic observation frontiers at t=0.000, t=1.000,</text>
<text x="24.00" y="634.00" fill="#2c2c2c" font-family="Georgia, Times New Roman, serif" font-size="13" font-weight="400">and t=2.000; the observation timeline records t=0 unresolved with ambiguous=2, t=1 unresolved with ambiguous=1, and t=2 determinate with ambiguous=0.</text>
<text x="24.00" y="652.00" fill="#2c2c2c" font-family="Georgia, Times New Roman, serif" font-size="13" font-weight="400">This makes staggered convergence visible as a property of the executable world report rather than as an external animation script.</text>
